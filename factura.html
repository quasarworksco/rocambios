  async function loadFactura() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const card = document.getElementById('pub-card');

    if (!id) {
      card.innerHTML = `<div class="pub-error"><div><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div><p>No se especificó ninguna factura.<br>Verifica el enlace.</p></div>`;

    try {
      const snap = await db.collection('documentos').doc(id).get();

        card.innerHTML = `<div class="pub-error"><div><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div><p>Factura no encontrada.<br>El enlace puede haber expirado.</p></div>`;

  async function firmarContrato(fsId) {
    const nombre = document.getElementById('contrato-nombre')?.value.trim();
    const check  = document.getElementById('contrato-check')?.checked;
    const errEl  = document.getElementById('contrato-err');
    if (!nombre) { errEl.style.display='block'; errEl.textContent='Escribe tu nombre completo para firmar.'; return; }
    if (!check)  { errEl.style.display='block'; errEl.textContent='Debes aceptar los términos para continuar.'; return; }
    errEl.style.display = 'none';
    try {
      await db.collection('documentos').doc(fsId).update({
        contratoFirmado:   true,
        contratoFirmadoPor: nombre,
        contratoFechaFirma: firebase.firestore.FieldValue.serverTimestamp()
      });
      location.reload();
    } catch(e) {
      errEl.style.display='block'; errEl.textContent='Error al guardar la firma. Intenta de nuevo.';

  /* ── Datos de entrega ── */
  function detectTipoEntrega(doc) {
    const srv = ((doc.items || [])[0]?.s || '').toLowerCase();
    if (srv.includes('físico') || srv.includes('fisico') || srv.includes('efectivo')) return 'fisico';
    if (srv.includes('bolívar') || srv.includes('bolivar') || srv.includes('pago móvil') || srv.includes('bs')) return 'bolivares';
    if (srv.includes('usdt')) return 'usdt';
    return null;
  }

  async function guardarEntrega(fsId, tipo) {
    const err = document.getElementById('ent-err');
    err.style.display = 'none';
    const get = id => document.getElementById(id)?.value?.trim() || '';
    let info = {}, ok = true;

    if (tipo === 'fisico') {
      const nombre = get('ent-nombre'); if (!nombre) { ok = false; }
      info = { 'Nombre': nombre, 'Cédula': get('ent-cedula'), 'Teléfono': get('ent-tel') };
    } else if (tipo === 'bolivares') {
      const nombre = get('ent-nombre'), cedula = get('ent-cedula'), banco = get('ent-banco'), tel = get('ent-tel');
      if (!nombre || !cedula || !banco || !tel) ok = false;
      info = { 'Nombre': nombre, 'Cédula': cedula, 'Banco': banco, 'Teléfono': tel };
    } else if (tipo === 'usdt') {
      const cuenta = get('ent-binance-cuenta'); if (!cuenta) ok = false;
      info = { 'Binance (correo/tel)': cuenta, 'Binance Pay ID': get('ent-binance-id') };
    }

    if (!ok) { err.style.display = 'block'; err.textContent = 'Por favor completa los campos obligatorios.'; return; }

    try {
      await db.collection('documentos').doc(fsId).update({ entregaGuardada: true, entregaInfo: info, entregaTipo: tipo, entregaFecha: firebase.firestore.FieldValue.serverTimestamp() });
      notificarEntregaTelegram(fsId, tipo, info);
      location.reload();
    } catch(e) {
      err.style.display = 'block'; err.textContent = 'Error al guardar. Intenta de nuevo.';
    }
  }

  async function subirComprobantePublico(input, fsId) {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { alert('La imagen no puede superar 5MB.'); return; }
    const progress = document.getElementById('pub-comp-progress');
    const bar      = document.getElementById('pub-comp-bar');
    progress.style.display = 'block';
    try {
      const formData = new FormData();
      formData.append('file', file);
      formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
      formData.append('folder', 'comprobantes');
      formData.append('public_id', `${fsId}_pub_${Date.now()}`);
      const xhr = new XMLHttpRequest();
      xhr.upload.addEventListener('progress', e => {
        if (e.lengthComputable) bar.style.width = Math.round(e.loaded / e.total * 100) + '%';
      });
      const url = await new Promise((resolve, reject) => {
        xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`);
        xhr.onload = () => { const r = JSON.parse(xhr.responseText); xhr.status === 200 ? resolve(r.secure_url) : reject(new Error(r.error?.message)); };
        xhr.onerror = () => reject(new Error('Error de red'));
        xhr.send(formData);
      });
      await db.collection('documentos').doc(fsId).update({ comprobante_url: url });
      notificarTelegram(fsId, url);
      progress.style.display = 'none';
      // Ask for titular name
      document.querySelector('.pub-comp-area').style.display = 'none';
      document.getElementById('titular-wrap').style.display = 'block';
      document.getElementById('titular-wrap').dataset.fsid = fsId;
      document.getElementById('titular-wrap').dataset.url  = url;
    } catch(e) {
      progress.style.display = 'none';
      alert('Error al subir el comprobante. Intenta de nuevo.');
    }
  }

    const wrap  = document.getElementById('titular-wrap');

    document.getElementById('pub-comp-ok').style.display = 'flex';
  }

  async function tgSend(payload) {
    const method = payload.photo ? 'sendPhoto' : 'sendMessage';
    const res = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/${method}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: TG_CHAT_ID, parse_mode: 'Markdown', ...payload })
    });
    const json = await res.json();
    if (!json.ok) console.error('Telegram error:', json);
    return json;
  }

  async function notificarTelegram(fsId, imageUrl) {
    try {
      const doc      = _currentDoc || {};
      const cliente  = doc.cli || doc.cliente || 'Cliente';
      const numero   = doc.docId || fsId;
      const total    = doc.total ? `$${Number(doc.total).toFixed(2)}` : '';
      const servicio = (doc.items || [])[0]?.s || '';
      const factUrl  = `https://rocambios.dgp-link.com/factura.html?id=${fsId}`;
      let entregaTexto = '';
      if (doc.entregaInfo) {
        const lineas = Object.entries(doc.entregaInfo).filter(([,v])=>v).map(([k,v])=>`   • ${k}: ${v}`).join('\n');
        entregaTexto = `\n\n📦 *Datos de entrega:*\n${lineas}`;
      }
      const caption = `💳 *Nuevo comprobante de pago*\n\n👤 *Cliente:* ${cliente}\n🧾 *Doc:* ${numero}${total?`\n💰 *Monto:* ${total}`:''}${servicio?`\n🔄 *Servicio:* ${servicio}`:''}${entregaTexto}\n\n🔗 [Ver factura](${factUrl})`;
      await tgSend({ photo: imageUrl, caption });
    } catch(e) { console.error('notificarTelegram error:', e); }
  }

  async function notificarEntregaTelegram(fsId, tipo, info) {
    try {
      const doc      = _currentDoc || {};
      const cliente  = doc.cli || doc.cliente || 'Cliente';
      const numero   = doc.docId || fsId;
      const total    = doc.total ? `$${Number(doc.total).toFixed(2)}` : '';
      const servicio = (doc.items || [])[0]?.s || '';
      const factUrl  = `https://rocambios.dgp-link.com/factura.html?id=${fsId}`;
      const tipoLabel = tipo === 'fisico' ? 'Efectivo (Físico)' : tipo === 'bolivares' ? 'Pago Móvil (Bs)' : 'USDT / Binance';
      const lineas = Object.entries(info).filter(([,v])=>v).map(([k,v])=>`   • ${k}: ${v}`).join('\n');
      const text = `📦 *Datos de entrega registrados*\n\n👤 *Cliente:* ${cliente}\n🧾 *Doc:* ${numero}${total?`\n💰 *Monto:* ${total}`:''}${servicio?`\n🔄 *Servicio:* ${servicio}`:''}\n📬 *Método:* ${tipoLabel}\n\n${lineas}\n\n🔗 [Ver factura](${factUrl})`;
      await tgSend({ text });

  function copiarTexto(txt, btn) {

      setTimeout(() => btn.textContent = 'Copiar', 2000);
    });
  }

  function renderFactura(card, doc) {
    _currentDoc = doc;
    const isParcial   = doc.type === 'factura' && !!doc.pagadoParcial && !doc.pagado;
    const isRecibo    = doc.pagado || doc.type === 'recibo';
    const isFactura   = !isParcial && !isRecibo;
    const isVanguard  = doc.marca === 'vanguard';

    const headerClass = isVanguard
      ? (isRecibo ? 'vng-header-recibo'     : 'vng-header-factura')
      : (isRecibo ? 'pub-header-recibo'     : 'pub-header-factura');
    const zigzagClass = isVanguard
      ? (isRecibo ? 'pub-zigzag-vng-gold'   : 'pub-zigzag-vng-dark')
      : (isRecibo ? 'pub-zigzag-blue'       : 'pub-zigzag-dark');
    const clientStyle = isVanguard
      ? (isRecibo ? 'vng-blue' : 'vng-dark')
      : (isRecibo ? 'blue'     : 'dark');
    const totalClass  = isVanguard
      ? (isRecibo ? 'vng-gold' : 'vng-dark')
      : (isRecibo ? 'blue'     : 'dark');
    const badgeClass  = isRecibo ? 'pagado' : (isParcial ? 'parcial' : 'pendiente');
    const badgeText   = isRecibo ? 'PAGO CONFIRMADO' : (isParcial ? 'PAGO PARCIAL' : 'PENDIENTE DE PAGO');
    const docTitle    = isRecibo ? 'RECIBO DE PAGO' : 'FACTURA';
    const totalLabel  = isRecibo ? 'Total Pagado' : 'Total a Pagar';

    const items = (doc.items || []).map(it => `
      <tr>
        <td><div class="item-name">${esc(it.s)}</div><div class="item-qty">${it.c > 1 ? `${it.c} unidades × $${it.p.toFixed(2)}` : 'Unidad'}</div></td>
        <td>$${(it.t||0).toFixed(2)}</td>
      </tr>`).join('');

    const parcialBlock = isParcial ? `
      <div class="pub-partial">
        <div class="pub-partial-col"><div class="pub-partial-label">Pagado</div><div class="pub-partial-value paid">$${(doc.montoPagado||0).toFixed(2)}</div></div>
        <div class="pub-partial-col" style="text-align:right"><div class="pub-partial-label">Pendiente</div><div class="pub-partial-value">$${((doc.total||0)-(doc.montoPagado||0)).toFixed(2)}</div></div>
      </div>` : '';

    const notaBlock = (isFactura || isParcial) && doc.nota ? `
      <div class="pub-nota"><strong>Instrucciones de pago:</strong><br>${esc(doc.nota)}</div>` : '';

    const brandName  = 'RO CAMBIOS · rocambios.com';
    const waText = encodeURIComponent(
      `Hola, aquí está tu ${docTitle.toLowerCase()} de RO Cambios:\n${window.location.href}`
    );

    card.innerHTML = `
      <div class="${headerClass}">
        <div class="pub-brand"${isVanguard ? ' style="color:rgba(212,175,55,0.7);letter-spacing:3px;"' : ''}>${brandName}</div>
        <div class="pub-title">${docTitle}</div>
        <div class="pub-docnum">N° ${esc(doc.docId || id)}</div>
        <div class="pub-badge ${badgeClass}">${badgeText}</div>
      </div>
      <div class="${zigzagClass}"></div>
      <div class="pub-body">
        <div class="pub-meta">
          <div class="pub-meta-col"><div class="pub-meta-label">Fecha</div><div class="pub-meta-value">${esc(doc.fecha||'—')}</div></div>
          ${doc.ref && doc.ref !== '—' ? `<div class="pub-meta-col" style="text-align:right"><div class="pub-meta-label">Referencia</div><div class="pub-meta-value" style="font-size:11px;">${esc(doc.ref)}</div></div>` : ''}
        </div>
        <div class="pub-client ${clientStyle}">
          <div class="pub-client-label ${clientStyle}">Cliente</div>
          <div class="pub-client-name">${esc(doc.cli||'—')}</div>
        </div>
        ${notaBlock}
        ${parcialBlock}
        <table>
          <thead><tr><th>Descripción</th><th style="text-align:right">Importe</th></tr></thead>
          <tbody>${items}</tbody>
        </table>
      </div>
      <div class="pub-total ${totalClass}">
        <span class="pub-total-label">${totalLabel}</span>
        <span class="pub-total-amount">$${(doc.total||0).toFixed(2)}</span>
      </div>
      <div class="pub-footer">
        <p>${isRecibo ? '¡Gracias por su preferencia!' : 'Una vez realizado el pago, recibirás tu recibo de confirmación.'}<br><strong>RO Cambios — Servicio de Remesas USA · Venezuela</strong></p>
      </div>
      ${!isRecibo ? renderContrato(doc, doc._fsId) : ''}
      ${!isRecibo && (!doc.contrato || doc.contratoFirmado) ? renderPago(doc) : ''}
      ${!isRecibo && (!doc.contrato || doc.contratoFirmado) ? renderEntregaForm(doc, doc._fsId) : ''}
      ${!isRecibo && (!doc.contrato || doc.contratoFirmado) ? renderComprobante(doc, doc._fsId) : ''}
      <div class="pub-actions">
        <button class="pub-btn print" onclick="window.print()" style="display:inline-flex;align-items:center;justify-content:center;gap:6px;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg> Imprimir</button>
        <button class="pub-btn wa" onclick="window.open('https://wa.me/?text=${waText}','_blank')" style="display:inline-flex;align-items:center;justify-content:center;gap:6px;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> Compartir</button>
      </div>
      ${renderTerminos(doc)}`;
  }










  const auth = firebase.auth();
  auth.signInAnonymously()
    .then(() => loadFactura())
    .catch(e => {
      // If anonymous auth is disabled, try loading anyway (Firestore rules may allow public reads)
      console.warn('Anonymous auth failed:', e.code);
      loadFactura();
    });
</script>
</body>
</html>
