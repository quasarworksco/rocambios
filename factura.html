<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comprobante — RO Cambios</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon"             href="/favicon.svg" type="image/svg+xml">
  <link rel="shortcut icon"    href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script type="module" crossorigin src="https://embed.hel.io/assets/index-v1.js"></script>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body { background:#f1f5f9; font-family:'IBM Plex Sans',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:24px 16px; }
    .pub-card { background:white; max-width:520px; width:100%; border-radius:20px; overflow:hidden; box-shadow:0 20px 60px rgba(0,0,0,0.12); }
    .pub-header-factura { background:linear-gradient(135deg,#1B4332,#2D6A4F); padding:28px 32px 24px; position:relative; }
    .pub-header-recibo  { background:linear-gradient(135deg,#2D6A4F,#40916C); padding:28px 32px 24px; position:relative; }
    .pub-brand { font-size:10px; font-weight:600; letter-spacing:4px; text-transform:uppercase; color:rgba(255,255,255,0.5); margin-bottom:6px; }
    .pub-title { font-family:'Bebas Neue',sans-serif; font-size:36px; color:white; letter-spacing:1px; }
    .pub-docnum { font-family:'Bebas Neue',sans-serif; font-size:13px; color:rgba(255,255,255,0.45); margin-top:4px; letter-spacing:2px; }
    .pub-badge { display:inline-flex; align-items:center; gap:5px; background:rgba(255,255,255,0.15); color:white; font-size:10px; font-weight:600; letter-spacing:2px; padding:4px 14px; border-radius:20px; margin-top:12px; }
    .pub-badge::before { content:''; width:6px; height:6px; border-radius:50%; display:block; }
    .pub-badge.pendiente::before { background:#fbbf24; }
    .pub-badge.pagado::before   { background:#34d399; }
    .pub-badge.parcial::before  { background:#fb923c; }
    .pub-zigzag-dark { height:14px; background:linear-gradient(-45deg,white 7px,transparent 0) 0 0,linear-gradient(45deg,white 7px,transparent 0) 0 0; background-color:#2D6A4F; background-size:14px 14px; background-repeat:repeat-x; }
    .pub-zigzag-blue { height:14px; background:linear-gradient(-45deg,white 7px,transparent 0) 0 0,linear-gradient(45deg,white 7px,transparent 0) 0 0; background-color:#40916C; background-size:14px 14px; background-repeat:repeat-x; }
    /* ── Vanguard theme ── */
    .vng-header-factura { background:linear-gradient(135deg,#0a0f1e 0%,#1c1500 100%); padding:28px 32px 24px; position:relative; border-bottom:2px solid #d4af37; }
    .vng-header-recibo  { background:linear-gradient(135deg,#b8960c 0%,#d4af37 100%); padding:28px 32px 24px; position:relative; }
    .pub-zigzag-vng-dark { height:14px; background:linear-gradient(-45deg,white 7px,transparent 0) 0 0,linear-gradient(45deg,white 7px,transparent 0) 0 0; background-color:#1c1500; background-size:14px 14px; background-repeat:repeat-x; }
    .pub-zigzag-vng-gold { height:14px; background:linear-gradient(-45deg,white 7px,transparent 0) 0 0,linear-gradient(45deg,white 7px,transparent 0) 0 0; background-color:#d4af37; background-size:14px 14px; background-repeat:repeat-x; }
    .pub-total.vng-dark { background:#0a0f1e; border-top:1px solid rgba(212,175,55,0.3); }
    .pub-total.vng-gold { background:linear-gradient(135deg,#b8960c,#d4af37); }
    .pub-client.vng-dark { background:rgba(212,175,55,0.06); border:1px solid rgba(212,175,55,0.18); }
    .pub-client.vng-blue { background:rgba(212,175,55,0.1); border:1px solid rgba(212,175,55,0.25); }
    .pub-client-label.vng-dark { color:#b8960c; }
    .pub-client-label.vng-blue { color:#b8960c; }
    .vng-pago-val { color:#b8960c !important; }
    .vng-footer { background:#0a0f1e; margin:0; padding:18px 32px; border-top:1px solid rgba(212,175,55,0.2); }
    .vng-footer p { color:rgba(255,255,255,0.55); font-size:11px; line-height:1.6; text-align:center; }
    .vng-footer strong { color:#d4af37; }
    .pub-body { padding:24px 32px 0; }
    .pub-meta { display:flex; justify-content:space-between; margin-bottom:18px; padding-bottom:16px; border-bottom:1px dashed #e2e8f0; }
    .pub-meta-col { }
    .pub-meta-label { font-size:9px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:#94a3b8; margin-bottom:3px; }
    .pub-meta-value { font-family:'Bebas Neue',sans-serif; font-size:14px; color:#0a0f1e; }
    .pub-client { border-radius:10px; padding:12px 16px; margin-bottom:18px; }
    .pub-client.dark { background:rgba(15,23,42,0.05); border:1px solid rgba(15,23,42,0.1); }
    .pub-client.blue { background:#D8F3DC; border:1px solid rgba(45,106,79,0.12); }
    .pub-client-label { font-size:9px; font-weight:600; letter-spacing:2px; text-transform:uppercase; margin-bottom:3px; }
    .pub-client-label.dark { color:#475569; }
    .pub-client-label.blue { color:#2D6A4F; }
    .pub-client-name { font-family:'Bebas Neue',sans-serif; font-size:20px; color:#0a0f1e; }
    .pub-nota { background:#fffbeb; border:1px solid rgba(217,119,6,0.2); border-radius:10px; padding:10px 14px; margin-bottom:18px; font-size:12px; color:#92400e; line-height:1.5; }
    .pub-partial { background:#fff7ed; border:1px solid rgba(251,146,60,0.3); border-radius:10px; padding:12px 16px; margin-bottom:18px; display:flex; justify-content:space-between; }
    .pub-partial-col { }
    .pub-partial-label { font-size:9px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:#9a3412; margin-bottom:2px; }
    .pub-partial-value { font-family:'Bebas Neue',sans-serif; font-size:18px; color:#ea580c; }
    .pub-partial-value.paid { color:#059669; }
    table { width:100%; border-collapse:collapse; margin-bottom:4px; }
    thead th { font-size:9px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:#94a3b8; padding:0 0 8px; text-align:left; border-bottom:1px solid #e2e8f0; }
    thead th:last-child { text-align:right; }
    tbody td { padding:9px 0; font-size:12.5px; color:#475569; border-bottom:1px solid #f8fafc; vertical-align:middle; }
    tbody td:last-child { text-align:right; font-weight:600; color:#0a0f1e; }
    tbody tr:last-child td { border-bottom:none; }
    .item-name { font-weight:500; color:#0a0f1e; }
    .item-qty  { font-size:10px; color:#94a3b8; margin-top:1px; }
    .pub-total { margin:0 -32px; padding:18px 32px; display:flex; justify-content:space-between; align-items:center; }
    .pub-total.dark { background:#0a0f1e; }
    .pub-total.blue { background:#2D6A4F; }
    .pub-total-label { font-size:10px; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,0.55); }
    .pub-total-amount { font-family:'Bebas Neue',sans-serif; font-size:34px; color:white; }
    .pub-footer { padding:16px 32px 24px; text-align:center; }
    .pub-footer p { font-size:11px; color:#94a3b8; line-height:1.6; }
    .pub-footer strong { color:#0a0f1e; }
    .pub-actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 32px 28px; }
    .pub-btn { padding:12px; border-radius:10px; font-family:'IBM Plex Sans',sans-serif; font-size:11px; font-weight:600; letter-spacing:1px; cursor:pointer; transition:all 0.2s; border:1.5px solid; text-align:center; }
    .pub-btn.print { background:#D8F3DC; color:#2D6A4F; border-color:rgba(45,106,79,0.2); }
    .pub-btn.print:hover { background:rgba(45,106,79,0.12); }
    .pub-btn.wa { background:#dcfce7; color:#15803d; border-color:rgba(5,150,105,0.25); }
    .pub-btn.wa:hover { background:#bbf7d0; }
    .pub-loading { padding:60px 32px; text-align:center; color:#94a3b8; font-size:14px; }
    .pub-error { padding:60px 32px; text-align:center; }
    .pub-error div:first-child { font-size:40px; margin-bottom:12px; }
    .pub-error p { color:#475569; font-size:13px; }
    .pub-terms { border-top:2px dashed #e2e8f0; margin:0 32px; padding:20px 0 4px; }
    .pub-terms-title { font-size:9px; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:#94a3b8; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
    .pub-terms-title::after { content:''; flex:1; height:1px; background:#e2e8f0; }
    .pub-term-item { display:flex; gap:10px; margin-bottom:10px; font-size:11px; color:#475569; line-height:1.5; }
    .pub-term-num { font-weight:700; color:#94a3b8; flex-shrink:0; font-size:12px; min-width:16px; }
    .pub-term-item .pub-term-num.ok  { color:#059669; }
    .pub-term-item .pub-term-num.num { color:#1438cc; }
    .pub-terms-section { margin-top:14px; padding-top:12px; border-top:1px solid #f1f5f9; }
    .pub-terms-section-title { font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#0a0f1e; margin-bottom:8px; }
    .pub-terms-contact { background:#f8fafc; border-radius:10px; padding:12px 16px; margin:16px 32px 0; display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px; }
    .pub-terms-contact-col { font-size:11px; color:#475569; }
    .pub-terms-contact-col strong { display:block; font-size:9px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:#94a3b8; margin-bottom:2px; }
    .pub-terms-accept { text-align:center; padding:12px 32px 24px; font-size:10px; color:#94a3b8; line-height:1.6; font-style:italic; }
    .pub-pago { margin:0 32px 0; padding:20px 0 0; }
    .pub-pago-title { font-size:9px; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:#94a3b8; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
    .pub-pago-title::after { content:''; flex:1; height:1px; background:#e2e8f0; }
    .pub-pago-card { background:#f8fafc; border:1px solid #e2e8f0; border-radius:12px; padding:16px 18px; margin-bottom:14px; }
    .pub-pago-metodo { font-size:13px; font-weight:600; color:#0a0f1e; margin-bottom:10px; }
    .pub-pago-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid #f1f5f9; gap:8px; }
    .pub-pago-row:last-child { border-bottom:none; }
    .pub-pago-key { font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:#94a3b8; flex-shrink:0; }
    .pub-pago-val { font-size:12px; color:#0a0f1e; font-weight:500; word-break:break-all; text-align:right; }
    .pub-pago-copy { background:none; border:1px solid #e2e8f0; border-radius:6px; padding:3px 8px; font-size:10px; cursor:pointer; color:#2D6A4F; flex-shrink:0; margin-left:8px; }
    .helio-section { margin:0 32px 16px; padding-top:8px; }
    .helio-toggle { display:flex; align-items:center; justify-content:space-between; background:#f8fafc; border:1px solid #e2e8f0; border-radius:10px; padding:11px 14px; cursor:pointer; user-select:none; }
    .helio-toggle-left { display:flex; align-items:center; gap:8px; font-size:12px; font-weight:500; color:#475569; }
    .helio-toggle-badge { background:#D8F3DC; color:#2D6A4F; font-size:9px; font-weight:700; letter-spacing:1px; padding:2px 8px; border-radius:20px; }
    .helio-toggle-arrow { font-size:11px; color:#94a3b8; transition:transform 0.2s; }
    .helio-toggle-arrow.open { transform:rotate(180deg); }
    .helio-body { overflow:hidden; max-height:0; transition:max-height 0.3s ease; }
    .helio-body.open { max-height:800px; }
    @media print { .helio-section { display:none; } }
    /* ── Brief del Proyecto ── */
    .brief-section { margin:0 32px 20px; }
    .brief-toggle { display:flex; align-items:center; justify-content:space-between; background:linear-gradient(135deg,#1B4332,#2D6A4F); border-radius:12px; padding:14px 18px; cursor:pointer; user-select:none; }
    .brief-toggle-left { display:flex; align-items:center; gap:10px; }
    .brief-toggle-icon { font-size:22px; }
    .brief-toggle-text strong { display:block; font-size:13px; font-weight:600; color:white; }
    .brief-toggle-text small { font-size:10px; color:rgba(255,255,255,0.55); }
    .brief-toggle-arrow { font-size:11px; color:rgba(255,255,255,0.5); transition:transform 0.25s; }
    .brief-toggle-arrow.open { transform:rotate(180deg); }
    .brief-body { overflow:hidden; max-height:0; transition:max-height 0.5s ease; }
    .brief-body.open { max-height:9000px; }
    .brief-inner { padding-top:16px; }
    .brief-step { margin-bottom:22px; }
    .brief-step-title { font-size:9px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:#94a3b8; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
    .brief-step-title::after { content:''; flex:1; height:1px; background:#e2e8f0; }
    .brief-label { font-size:11px; font-weight:600; color:#475569; margin-bottom:5px; display:block; }
    .brief-label .req { color:#ef4444; }
    .brief-input { width:100%; padding:10px 12px; border:1.5px solid #e2e8f0; border-radius:8px; font-family:'IBM Plex Sans',sans-serif; font-size:12px; color:#0a0f1e; background:white; outline:none; box-sizing:border-box; transition:border-color 0.2s; }
    .brief-input:focus { border-color:#1438cc; }
    .brief-textarea { min-height:80px; resize:vertical; }
    .brief-field { margin-bottom:12px; }
    .brief-2col { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    /* Style mockups */
    .brief-style-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:4px; }
    .brief-style-card { border:2px solid #e2e8f0; border-radius:10px; overflow:hidden; cursor:pointer; transition:all 0.2s; }
    .brief-style-card.sel { border-color:#1438cc; box-shadow:0 0 0 3px rgba(20,56,204,0.15); }
    .brief-style-preview { height:70px; position:relative; overflow:hidden; }
    .brief-style-lbl { padding:8px 10px; font-size:11px; font-weight:600; color:#64748b; text-align:center; background:white; }
    .brief-style-card.sel .brief-style-lbl { color:#1438cc; background:#eff3ff; }
    .mock-min { background:#fff; }
    .mock-min-bar { height:3px; background:#1438cc; width:38%; margin:14px auto 0; border-radius:2px; }
    .mock-min-circle { width:22px; height:22px; border-radius:50%; background:#f1f5f9; margin:7px auto; }
    .mock-min-line { height:2px; background:#f1f5f9; margin:3px 16px; border-radius:1px; }
    .mock-min-line.s { margin:3px 28px; }
    .mock-corp { background:#0f172a; }
    .mock-corp-head { height:26px; background:#1438cc; display:flex; align-items:center; padding:0 8px; gap:3px; }
    .mock-corp-dot { width:5px; height:5px; border-radius:50%; background:rgba(255,255,255,0.35); }
    .mock-corp-body { padding:5px 8px; }
    .mock-corp-ln { height:2px; background:rgba(255,255,255,0.12); margin-bottom:4px; border-radius:1px; }
    .mock-corp-ln.a { background:#2979ff; width:42%; }
    .mock-cre { background:linear-gradient(135deg,#7c3aed,#db2777); position:relative; }
    .mock-cre-blob { position:absolute; width:48px; height:48px; border-radius:50%; background:rgba(255,255,255,0.12); top:-12px; right:-10px; }
    .mock-cre-inner { padding:10px 10px 0; }
    .mock-cre-big { height:8px; background:white; border-radius:2px; margin-bottom:4px; width:68%; }
    .mock-cre-sm { height:4px; background:rgba(255,255,255,0.45); border-radius:2px; width:48%; }
    .mock-cre-btn { margin:8px 10px 0; height:13px; background:white; border-radius:20px; width:38%; }
    .mock-eleg { background:#0a0f1e; }
    .mock-eleg-ln { height:1px; background:rgba(212,175,55,0.55); margin:11px 14px 5px; }
    .mock-eleg-t1 { height:6px; background:rgba(212,175,55,0.75); border-radius:1px; margin:0 18px 4px; }
    .mock-eleg-t2 { height:3px; background:rgba(255,255,255,0.18); border-radius:1px; margin:0 22px 3px; }
    .mock-eleg-t3 { height:3px; background:rgba(255,255,255,0.12); border-radius:1px; margin:0 26px; }
    .mock-eleg-ln2 { height:1px; background:rgba(212,175,55,0.25); margin:7px 14px 0; }
    /* Paletas */
    .brief-palette-grid { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:4px; }
    .brief-palette { display:flex; border-radius:8px; overflow:hidden; cursor:pointer; border:2px solid transparent; transition:all 0.18s; height:30px; }
    .brief-palette.sel { border-color:#1438cc; transform:scale(1.07); }
    .brief-palette-sw { width:30px; height:30px; }
    .brief-custom-row { display:flex; gap:8px; margin-top:10px; align-items:center; }
    .brief-custom-row label { font-size:11px; color:#94a3b8; flex-shrink:0; }
    .brief-cpick { width:36px; height:36px; border-radius:8px; border:1.5px solid #e2e8f0; cursor:pointer; padding:2px; background:none; }
    /* Páginas */
    .brief-pages-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .brief-chk { display:flex; align-items:center; gap:7px; padding:8px 10px; border:1.5px solid #e2e8f0; border-radius:8px; cursor:pointer; transition:all 0.15s; }
    .brief-chk input { width:15px; height:15px; accent-color:#1438cc; flex-shrink:0; }
    .brief-chk label { font-size:12px; color:#475569; cursor:pointer; }
    .brief-chk:has(input:checked) { border-color:#1438cc; background:#eff3ff; }
    .brief-chk:has(input:checked) label { color:#1438cc; font-weight:500; }
    /* Sociales */
    .brief-social-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
    .brief-social-icon { font-size:18px; flex-shrink:0; width:26px; text-align:center; }
    .brief-social-lbl { font-size:11px; font-weight:600; color:#64748b; flex-shrink:0; width:82px; }
    /* Logo opts */
    .brief-logo-opts { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
    .brief-logo-opt { border:2px solid #e2e8f0; border-radius:10px; padding:12px; text-align:center; cursor:pointer; transition:all 0.15s; }
    .brief-logo-opt.sel { border-color:#1438cc; background:#eff3ff; }
    .brief-logo-opt-icon { font-size:22px; margin-bottom:3px; }
    .brief-logo-opt-lbl { font-size:12px; font-weight:600; color:#64748b; }
    .brief-logo-opt.sel .brief-logo-opt-lbl { color:#1438cc; }
    /* Submit */
    .brief-submit-btn { width:100%; padding:14px; background:#1438cc; color:white; border:none; border-radius:10px; font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:background 0.2s; margin-top:4px; }
    .brief-submit-btn:hover { background:#0f2ba8; }
    .brief-submit-btn:disabled { background:#94a3b8; cursor:not-allowed; }
    .brief-done { background:#f0fdf4; border:1.5px solid rgba(5,150,105,0.25); border-radius:12px; padding:22px; text-align:center; }
    .brief-done .bd-icon { font-size:34px; margin-bottom:8px; }
    .brief-done p { font-size:13px; font-weight:600; color:#059669; margin-bottom:4px; }
    .brief-done small { font-size:11px; color:#94a3b8; }
    .brief-err { display:none; color:#ef4444; font-size:12px; margin-top:8px; text-align:center; }
    @media print {
      .brief-section { display:none; }
      body { background:white; padding:0; }
      .pub-card { border-radius:0; box-shadow:none; max-width:100%; }
      .pub-actions { display:none; }
      .pub-header-factura, .pub-header-recibo, .pub-total { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    }
    .pub-pago-copy:hover { background:#D8F3DC; }
    /* ── Entrega form ── */
    .pub-entrega-wrap { margin:0 32px 20px; }
    .pub-entrega-box { background:linear-gradient(135deg,#f0faf4,#e8f5ee); border:1.5px solid #b7e4c7; border-radius:14px; padding:18px 20px; }
    .pub-entrega-title { font-size:9px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#2D6A4F; margin-bottom:14px; display:flex; align-items:center; gap:7px; }
    .pub-entrega-field { margin-bottom:12px; }
    .pub-entrega-field:last-child { margin-bottom:0; }

  async function guardarEntrega(fsId, tipo) {
    const err = document.getElementById('ent-err');
    err.style.display = 'none';
    const get = id => document.getElementById(id)?.value?.trim() || '';
    let info = {}, ok = true;

    if (tipo === 'fisico') {
      const nombre = get('ent-nombre'); if (!nombre) { ok = false; }
      info = { 'Nombre': nombre, 'Cédula': get('ent-cedula'), 'Teléfono': get('ent-tel') };
    } else if (tipo === 'bolivares') {
      const nombre = get('ent-nombre'), cedula = get('ent-cedula'), banco = get('ent-banco'), tel = get('ent-tel');
      if (!nombre || !cedula || !banco || !tel) ok = false;
      info = { 'Nombre': nombre, 'Cédula': cedula, 'Banco': banco, 'Teléfono': tel };
    } else if (tipo === 'usdt') {
      const cuenta = get('ent-binance-cuenta'); if (!cuenta) ok = false;
      info = { 'Binance (correo/tel)': cuenta, 'Binance Pay ID': get('ent-binance-id') };
    }

    if (!ok) { err.style.display = 'block'; err.textContent = 'Por favor completa los campos obligatorios.'; return; }

    try {
      await db.collection('documentos').doc(fsId).update({ entregaGuardada: true, entregaInfo: info, entregaTipo: tipo, entregaFecha: firebase.firestore.FieldValue.serverTimestamp() });
      notificarEntregaTelegram(fsId, tipo, info);
      location.reload();
    } catch(e) {
      err.style.display = 'block'; err.textContent = 'Error al guardar. Intenta de nuevo.';
    }
  }

  async function subirComprobantePublico(input, fsId) {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { alert('La imagen no puede superar 5MB.'); return; }
    const progress = document.getElementById('pub-comp-progress');
    const bar      = document.getElementById('pub-comp-bar');
    progress.style.display = 'block';
    try {
      const formData = new FormData();
      formData.append('file', file);
      formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
      formData.append('folder', 'comprobantes');
      formData.append('public_id', `${fsId}_pub_${Date.now()}`);
      const xhr = new XMLHttpRequest();
      xhr.upload.addEventListener('progress', e => {
        if (e.lengthComputable) bar.style.width = Math.round(e.loaded / e.total * 100) + '%';
      });
      const url = await new Promise((resolve, reject) => {
        xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`);
        xhr.onload = () => { const r = JSON.parse(xhr.responseText); xhr.status === 200 ? resolve(r.secure_url) : reject(new Error(r.error?.message)); };
        xhr.onerror = () => reject(new Error('Error de red'));
        xhr.send(formData);
      });
      await db.collection('documentos').doc(fsId).update({ comprobante_url: url });
      notificarTelegram(fsId, url);
      progress.style.display = 'none';
      document.getElementById('pub-comp-ok').style.display = 'flex';
      document.querySelector('.pub-comp-area').style.display = 'none';
    } catch(e) {
      progress.style.display = 'none';
      alert('Error al subir el comprobante. Intenta de nuevo.');
    }
  }

  async function tgSend(payload) {
    const method = payload.photo ? 'sendPhoto' : 'sendMessage';
    const res = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/${method}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: TG_CHAT_ID, parse_mode: 'Markdown', ...payload })
    });
    const json = await res.json();
    if (!json.ok) console.error('Telegram error:', json);
    return json;
  }

  function renderUpsell(doc, isVanguard) {
    const items = (doc.items || []).map(i => (i.s || '').toLowerCase()).join(' ');

    let titulo = '', texto = '', servicio = '';
    if (items.includes('seguidor')) {
      titulo   = 'Complementa tu crecimiento';
      texto    = 'Con publicidad masiva en grupos de WhatsApp llegás a miles de personas reales en todo el país. Perfecto para que esos seguidores nuevos vean actividad real.';
      servicio = 'WhatsApp Marketing';
    } else if (items.includes('web') || items.includes('ecommerce')) {
      titulo   = '¿Tu marca tiene identidad visual?';
      texto    = 'Un logo y una paleta profesional hacen que tu sitio se vea completo y confiable. Lo trabajamos junto con tu web o por separado.';
      servicio = 'Identidad Visual';
    } else if (items.includes('whatsapp')) {
      titulo   = 'Aumenta tu alcance';
      texto    = 'Más seguidores en tus redes le dan más credibilidad a tu negocio. Tenemos paquetes desde 1,000 con garantía de por vida.';
      servicio = 'Seguidores';
    } else if (items.includes('diseño') || items.includes('identidad') || items.includes('logo') || items.includes('flyer') || items.includes('tarjeta')) {
      titulo   = '¿Ya tienes tu sitio web?';
      texto    = 'Con tu identidad lista, un sitio web profesional es el siguiente paso para que los clientes te encuentren y confíen en tu marca.';
      servicio = 'Sitio Web';
    } else {
      return '';
    }

    const waNum  = isVanguard ? '18632548314' : '12398231738';
    const waText = encodeURIComponent(`Hola! Vi mi factura y me interesa saber más sobre ${servicio}.`);
    const color  = isVanguard ? '#b8960c' : '#1438cc';
    const bgColor = isVanguard ? '#fffbeb' : '#eff3ff';

    return `
      <div style="margin:0 32px 24px;padding:16px 18px;background:${bgColor};border:1.5px solid ${isVanguard ? 'rgba(184,150,12,0.25)' : 'rgba(20,56,204,0.15)'};border-radius:14px;">
        <div style="font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:${color};margin-bottom:6px;opacity:0.8;">¿Sabías que?</div>
        <div style="font-size:12px;font-weight:600;color:#0a0f1e;margin-bottom:4px;">${titulo}</div>
        <div style="font-size:11px;color:#475569;line-height:1.6;margin-bottom:12px;">${texto}</div>
        <a href="https://wa.me/${waNum}?text=${waText}" target="_blank"
          style="display:inline-flex;align-items:center;gap:6px;background:${color};color:white;padding:8px 16px;border-radius:8px;font-size:11px;font-weight:600;text-decoration:none;">

          Me interesa
        </a>
      </div>`;
  }

  function renderBrief(doc, fsId, isVanguard) {
    const s = detectServicios(doc.items);

    const contactName = isVanguard ? 'Lisnay' : 'Andrés';

      return `<div class="brief-section">
        <div class="brief-done">
          <div class="bd-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></div>
          <p>¡Brief enviado!</p>
          <small>Gracias, ${contactName} revisará tu información y te contactará pronto.</small>
        </div>
      </div>`;
    }

    let formHTML = '';
    if (s.web)        formHTML = _briefWebForm(fsId, isVanguard);
    else if (s.seguidores) formHTML = _briefSeguidoresForm(doc, fsId);
    else if (s.redes) formHTML = _briefRedesForm(fsId);
    else if (s.ads)   formHTML = _briefAdsForm(fsId);

    return `
    <div class="brief-section" id="brief-section">
      <div class="brief-toggle" onclick="toggleBrief()">
        <div class="brief-toggle-left">
          <span class="brief-toggle-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></span>
          <div class="brief-toggle-text">
            <strong>Brief del Proyecto</strong>
            <small>Cuéntanos lo que necesitamos para empezar — opcional pero importante</small>
          </div>
        </div>
        <span class="brief-toggle-arrow" id="brief-arrow">▼</span>
      </div>
      <div class="brief-body" id="brief-body">
        <div class="brief-inner">${formHTML}</div>
      </div>
    </div>`;
  }

  function toggleBrief() {
    const body = document.getElementById('brief-body');
    const arrow = document.getElementById('brief-arrow');
    body.classList.toggle('open');
    arrow.classList.toggle('open', body.classList.contains('open'));
  }

    document.querySelectorAll('.brief-style-card').forEach(c => c.classList.remove('sel'));

    document.querySelectorAll('.brief-palette').forEach(p => p.classList.remove('sel'));

              <label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;padding:5px 10px;border:1.5px solid #e2e8f0;border-radius:20px;">

  function _briefAdsForm(fsId) {
    return `
      <div class="brief-step">
        <div class="brief-step-title" style="display:flex;align-items:center;gap:6px;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> Datos de contacto</div>
        <div class="brief-2col">
          <div class="brief-field"><label class="brief-label">Nombre del negocio <span class="req">*</span></label>
            <input id="b-negocio" class="brief-input" type="text" placeholder="Mi Empresa"></div>
          <div class="brief-field"><label class="brief-label">Correo <span class="req">*</span></label>
            <input id="b-correo" class="brief-input" type="email" placeholder="correo@ejemplo.com"></div>

      <div class="brief-step">
        <div class="brief-step-title" style="display:flex;align-items:center;gap:6px;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg> Objetivo de la campaña</div>

            <label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;padding:6px 12px;border:1.5px solid #e2e8f0;border-radius:20px;">

              <label style="display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;padding:6px 12px;border:1.5px solid #e2e8f0;border-radius:20px;">

  async function guardarBrief(fsId, tipo) {
    const btn = document.querySelector('.brief-submit-btn');
    const errEl = document.getElementById('brief-err');
    errEl.style.display = 'none';

    const v = id => document.getElementById(id)?.value?.trim() || '';
    const nombre  = v('b-nombre');
    const correo  = v('b-correo');
    const negocio = v('b-negocio');

    if (!nombre || !correo) {
      errEl.style.display = 'block';
      errEl.textContent   = 'Por favor completa los campos obligatorios (*)';
      return;
    }

    btn.disabled    = true;
    btn.textContent = 'Enviando...';

    let brief = { tipo, nombre, correo, fechaEnvio: new Date().toISOString() };

    if (tipo === 'web') {
      if (!v('b-objetivo')) {
        errEl.style.display = 'block';
        errEl.textContent   = 'Por favor completa los campos obligatorios (*)';
        btn.disabled = false; btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Enviar Brief del Proyecto';
        return;
      }
      const estiloEl  = document.querySelector('.brief-style-card.sel');
      const paletteEl = document.querySelector('.brief-palette.sel');
      const paginas   = [...document.querySelectorAll('.brief-pages-grid input:checked')].map(c => c.value);
      const otrasPag  = v('b-otras');
      brief = { ...brief,
        negocio,
        tel:         v('b-tel'),
        ubicacion:   v('b-ubi'),
        descripcion: v('b-desc'),
        estilo:      estiloEl?.dataset.estilo || '',
        colores: {
          paleta: paletteEl?.dataset.pal || 'personalizada',
          c1: document.getElementById('b-c1')?.value || '',
          c2: document.getElementById('b-c2')?.value || '',
          c3: document.getElementById('b-c3')?.value || '',
        },
        logo: document.querySelector('.brief-logo-opt.sel')?.dataset.v || '',
        paginas: [...paginas, ...(otrasPag ? [otrasPag] : [])],
        redes: { ig:v('b-sn-ig'), fb:v('b-sn-fb'), tt:v('b-sn-tt'), yt:v('b-sn-yt'), tw:v('b-sn-tw'), li:v('b-sn-li'), wa:v('b-sn-wa'), gmb:v('b-sn-gmb') },
        referencias: [v('b-r1'),v('b-r2'),v('b-r3')].filter(Boolean),
        objetivo:    v('b-objetivo'),
        contenido:   document.querySelector('input[name="b-cont"]:checked')?.value || '',
        extra:       v('b-extra'),
      };
    } else if (tipo === 'seguidores') {
      const redes = ['instagram','facebook','tiktok','youtube','twitterx'];
      brief.cuentas = redes.map(r => ({
        red:      r,
        usuario:  v(`b-seg-${r}`),
        cantidad: v(`b-seg-${r}-cant`),
      })).filter(c => c.usuario);
      brief.extra = v('b-extra');
    } else if (tipo === 'redes') {
      brief = { ...brief, negocio,
        redes:  { ig:v('b-sn-ig'), fb:v('b-sn-fb'), tt:v('b-sn-tt'), yt:v('b-sn-yt') },
        tono:   document.querySelector('input[name="b-tono"]:checked')?.value || '',
        extra:  v('b-extra'),
      };
    } else if (tipo === 'ads') {
      brief = { ...brief, negocio,
        objetivo: document.querySelector('input[name="b-obj"]:checked')?.value || '',
        red:      document.querySelector('input[name="b-red"]:checked')?.value || '',
        extra:    v('b-extra'),
      };
    }

    try {
      await db.collection('documentos').doc(fsId).update({ brief });
      document.getElementById('brief-section').innerHTML = `
        <div class="brief-done">
          <div class="bd-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
          <p>¡Brief enviado con éxito!</p>
          <small>Andrés revisará tu información y se pondrá en contacto pronto.</small>
        </div>`;
    } catch(e) {
      console.error('Error brief:', e);
      btn.disabled    = false;
      btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Enviar Brief del Proyecto';
      errEl.style.display = 'block';
      errEl.textContent   = 'Error al guardar. Intenta de nuevo.';
    }
  }

  const auth = firebase.auth();
  auth.signInAnonymously()
    .then(() => loadFactura())
    .catch(e => {
      // If anonymous auth is disabled, try loading anyway (Firestore rules may allow public reads)
      console.warn('Anonymous auth failed:', e.code);
      loadFactura();
    });
</script>
